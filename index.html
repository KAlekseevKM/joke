<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Шутка</title>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:50px;">

<h1>😂 Твоя шутка</h1>
<p id="joke"></p>
<button onclick="loadJoke()">Еще 😄</button>

<script>
const localJokes = [
  "Ты красавчик 😎",
  "Чек говорит: все под контролем (нет)",
  "Ты купил это не зря... наверное",
  "Жизнь - это чек без скидки",
  "Система не ошибается. Ошибаешься ты 😄"
];

function getLocalJoke() {
  return localJokes[Math.floor(Math.random() * localJokes.length)];
}

function loadJoke() {
  fetch("https://official-joke-api.appspot.com/random_joke")
    .then(res => res.json())
    .then(data => {
      document.getElementById("joke").innerText =
        data.setup + " 😂 " + data.punchline;
    })
    .catch(() => {
      document.getElementById("joke").innerText = getLocalJoke();
    });
}

// при открытии страницы сразу загружаем шутку
loadJoke();
</script>
</body>
</html>
