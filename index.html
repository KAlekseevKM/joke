<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Шутка</title>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:50px;">

<h1>😂 Твоя шутка</h1>
<p id="joke"></p>
<button onclick="loadJoke()">Еще 😄</button>

<script>
const jokes = [
  "Кассир: пакет нужен? Я: мне бы зарплату...",
  "Жизнь - как чек: длинная и без скидок",
  "Ты это купил... теперь живи с этим 😄",
  "Ошибка: денег нет, но вы держитесь",
  "Скидка была, но ты ее не заслужил",
  "Этот чек - доказательство твоих решений",
  "Покупка совершена. Сожаление загружается...",
  "Ты богат... духовно 😎",
  "Еще один чек - еще один шаг к успеху (или нет)",
  "Ты точно это хотел купить?"
];

function getRandomJoke() {
  return jokes[Math.floor(Math.random() * jokes.length)];
}

function loadJoke() {
  document.getElementById("joke").innerText = getRandomJoke();
}

loadJoke();
</script>
</body>
</html>
